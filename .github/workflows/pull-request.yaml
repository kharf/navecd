name: Pull-Request
on:
  pull_request:
    branches:
      - '*'
    tags-ignore:
      - '*'

permissions: read-all

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Test
        uses: dagger/dagger-for-github@v8.4.0
        with:
          call: test --source=.
          version: latest
